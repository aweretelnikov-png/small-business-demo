services:
     postgres:
       image: postgres:16
       container_name: sales-postgres
       environment:
         POSTGRES_DB: sales_demo
         POSTGRES_USER: sales_user
         POSTGRES_PASSWORD: change_this_local_password
       ports:
         - "5432:5432"
       volumes:
         - postgres_data:/var/lib/postgresql/data
       networks:
         - default
         - reporting
     metabase:
       image: metabase/metabase:latest
       container_name: sales-metabase
       ports:
         - "3000:3000"
       environment:
         MB_DB_TYPE: h2
         MB_DB_FILE: /metabase-data/metabase.db
       volumes:
         - metabase_data:/metabase-data
       depends_on:
         - postgres
       networks:
         - default
         - reporting

networks:
  reporting:
    external: true
    name: small-business-demo-network

volumes:
  postgres_data:
  metabase_data: