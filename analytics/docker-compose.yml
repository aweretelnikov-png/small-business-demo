services:
     postgres:
       image: postgres:16
       container_name: sales-postgres
       environment:
         POSTGRES_DB: sales_demo
         POSTGRES_USER: sales_user
         POSTGRES_PASSWORD: change_this_local_password
       ports:
         - "5432:5432"
       volumes:
         - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: